<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live HTML Editor</title>
<style>iframe{width:100vw;border:none;height:100%} #editor{position:relative; width:100vw; height:300px; resize:vertical; overflow:auto;}body{padding:0px;margin:0px;}html,body{height: 100%;overflow:hidden;}
.box {display: flex; flex-flow: column; height: 100%;}.box-container {display: contents;}
.box .row.eddy {flex: 0 1 auto;border-bottom:4px gray solid;}.box .row.showy {flex: 1 1 auto;}
</style>
<script src="https://cdn.jsdelivr.net/combine/npm/ace-builds@1.43.5,npm/ace-builds@1.43.5/src-min-noconflict/ext-searchbox.js,npm/ace-builds@1.43.5/src-min-noconflict/mode-html.js,npm/ace-builds@1.43.5/src-min-noconflict/ext-language_tools.js,npm/ace-builds@1.43.5/src-min-noconflict/theme-crimson_editor.js,npm/ace-builds@1.43.5/src-min-noconflict/ext-options.js"></script>  <body>
<div class="box"><div class="box-container">
    <div id="editor" class="row eddy"></div>
    <div class="row showy"><iframe id="result"></iframe></div>
</div></div>
  </body>
  <script>
    var BASEeditor = ace.edit("editor"); BASEeditor.insert("<!DOCTYPE html>\n");
    BASEeditor.setTheme("ace/theme/crimson_editor");
    BASEeditor.session.setMode("ace/mode/html");
    BASEeditor.setOptions({"selectionStyle": "line","enableAutoIndent": true,"showLineNumbers": false,"hScrollBarAlwaysVisible": false,"vScrollBarAlwaysVisible": false,"highlightGutterLine": false,"animatedScroll": false,"showPrintMargin": false,"printMargin": false,"fadeFoldWidgets": false,"showFoldWidgets": true,"displayIndentGuides": false,"highlightIndentGuides": false,"showGutter": false,"fontSize": "14px","useTextareaForIME": true,"useSoftTabs": false,"scrollSpeed": 2,"wrap": "off","indentedSoftWrap": false,"foldStyle": "markbegin","enableMultiselect": true,"enableBlockSelect": true,"enableBasicAutocompletion": true,"enableLiveAutocompletion": true,"liveAutocompletionThreshold":3})

    const BASEeddy = document.getElementById("editor");
    const BASEresult = document.getElementById("result");
    BASEeddy.addEventListener("mouseover",BASEeditor.resize());
    // iframe logic from https://github.com/sauravhathi/live-html-editor & https://htmledit.squarefree.com/
    BASEeddy.addEventListener("keyup", update())
    function update() {
        if (old != BASEeditor.getValue()) {
            old=BASEeditor.getValue();
            BASEresult.contentWindow.document.open(); //open the iframe document
            BASEresult.contentWindow.document.write(BASEeditor.getValue()); //write the html value to the iframe document
            BASEresult.contentWindow.document.close(); //close the iframe document
        }  
        window.setTimeout(update, 150);
    };
  </script>
</html>
